name: graphify
on:
  schedule:
    - cron: "17 6 * * *"  # nightly 06:17 UTC
  push:
    branches: ["main", "claude/graphify-open-research-setup-*"]
    paths:
      - "**/*.py"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/CLAUDE.md"
      - "**/*.md"
      - "package.json"
      - "pyproject.toml"
      - ".github/workflows/graphify.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-graph:
    runs-on: ubuntu-latest
    if: github.repository_owner != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install graphify
        run: |
          # graphify installs locally; this is a stub for CI.
          # Replace with the real install when safishamsi/graphify exposes a pip target.
          pip install --upgrade pip
      - name: Run graphify scan
        run: |
          mkdir -p docs/graph
          if command -v graphify >/dev/null 2>&1; then
            graphify scan .
          else
            echo "graphify not installed in CI yet — skipping scan (workflow will pass)."
          fi
      - name: Commit refreshed graph + agent index
        run: |
          git config user.name "graphify-bot"
          git config user.email "graphify-bot@users.noreply.github.com"
          git add docs/graph docs/agent-index.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "graphify: nightly refresh of repo graph + agent index"
          git push
