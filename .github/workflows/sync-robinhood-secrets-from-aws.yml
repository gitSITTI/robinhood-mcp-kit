name: Sync Robinhood Secrets From AWS

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  read-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROBINHOOD_SECRET_READ_ROLE_ARN }}
          aws-region: us-east-2

      - name: Read Robinhood app secret bundle
        run: |
          aws secretsmanager get-secret-value \
            --secret-id robinhood/chatgpt-app/config \
            --query SecretString \
            --output text > robinhood-secret-bundle.json
          jq 'keys' robinhood-secret-bundle.json

      - name: Reminder
        run: |
          echo "Do not print secret values. Consume robinhood-secret-bundle.json inside this job only."
