# Dependabot keeps the Worker's npm deps and CI actions patched.
# The Worker uses @noble/curves (cryptographic signing) + zod + wrangler, so
# timely security bumps matter here.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/chatgpt-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
